name: Code Search Tool

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Text to search in the codebase"
        required: true
        default: "hello"

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show search query
        run: |
          echo "Searching for: ${{ github.event.inputs.query }}"

      - name: Search codebase
        run: |
          grep -RIn "${{ github.event.inputs.query }}" . || echo "No matches found"
