name: Delete Specific Commit

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: "Commit hash to delete"
        required: true

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          TARGET=${{ github.event.inputs.commit_hash }}

          echo "Deleting commit $TARGET"

          # Rebase and drop the commit
          git rebase --rebase-merges --onto $TARGET^ $TARGET

      - name: Force push
        run: |
          git push origin HEAD --force
